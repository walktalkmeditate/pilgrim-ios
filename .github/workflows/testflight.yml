name: TestFlight

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  testflight:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy Secrets
        run: cp Secrets.xcconfig.example Secrets.xcconfig

      - name: Setup API Key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_API_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$API_KEY_BASE64" | base64 -d > ~/.private_keys/AuthKey_"$API_KEY_ID".p8

      - name: Bump Build Number
        run: scripts/release.sh bump

      - name: Commit Build Bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Pilgrim.xcodeproj/project.pbxproj
          git commit -m "chore: bump build number [skip ci]"
          git push

      - name: Archive
        run: scripts/release.sh archive

      - name: Export
        run: scripts/release.sh export

      - name: Upload to App Store Connect
        env:
          APP_STORE_API_KEY: ${{ secrets.APP_STORE_API_KEY }}
          APP_STORE_API_ISSUER: ${{ secrets.APP_STORE_API_ISSUER }}
        run: scripts/release.sh upload
