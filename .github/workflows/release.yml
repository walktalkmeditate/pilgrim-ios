name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.1). Leave empty to use current version.'
        required: false
        default: ''

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Copy Secrets
        run: cp Secrets.xcconfig.example Secrets.xcconfig

      - name: Setup API Key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$API_KEY_BASE64" | base64 -d > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_API_KEY }}.p8

      - name: Bump
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            scripts/release.sh bump --version ${{ github.event.inputs.version }}
          else
            scripts/release.sh bump
          fi

      - name: Archive
        run: scripts/release.sh archive

      - name: Export
        run: scripts/release.sh export

      - name: Upload to App Store Connect
        env:
          APP_STORE_API_KEY: ${{ secrets.APP_STORE_API_KEY }}
          APP_STORE_API_ISSUER: ${{ secrets.APP_STORE_API_ISSUER }}
        run: scripts/release.sh upload

      - name: Generate Changelog
        run: scripts/release.sh changelog
