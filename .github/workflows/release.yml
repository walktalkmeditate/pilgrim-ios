name: Release

# Disabled until CocoaPods supports Xcode 26 project object version 70.
# Tracking: https://github.com/CocoaPods/CocoaPods/issues/12889
# Re-enable when pod install works on CI runners with Xcode 26.

# on:
#   workflow_dispatch:

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Release blocked — CocoaPods does not support Xcode 26 project format. Use local archive via Xcode Organizer.'
        required: false
        default: 'blocked'

jobs:
  release:
    runs-on: macos-15
    if: false
    steps:
      - run: echo "Blocked until CocoaPods supports object version 70"
