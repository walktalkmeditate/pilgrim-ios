name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.1). Leave empty to use current version.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy Secrets
        run: cp Secrets.xcconfig.example Secrets.xcconfig

      - name: Setup API Key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_API_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$API_KEY_BASE64" | base64 -d > ~/.private_keys/AuthKey_"$API_KEY_ID".p8

      - name: Bump
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            scripts/release.sh bump --version "$INPUT_VERSION"
          else
            scripts/release.sh bump
          fi

      - name: Commit Version Bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Pilgrim.xcodeproj/project.pbxproj
          git commit -m "release: bump build [skip ci]"
          git push

      - name: Archive
        run: scripts/release.sh archive

      - name: Export
        run: scripts/release.sh export

      - name: Upload to App Store Connect
        env:
          APP_STORE_API_KEY: ${{ secrets.APP_STORE_API_KEY }}
          APP_STORE_API_ISSUER: ${{ secrets.APP_STORE_API_ISSUER }}
        run: scripts/release.sh upload

      - name: Generate Changelog
        run: scripts/release.sh changelog
