name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.1). Leave empty to use current version.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      APP_STORE_API_KEY: ${{ secrets.APP_STORE_API_KEY }}
      APP_STORE_API_ISSUER: ${{ secrets.APP_STORE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Secrets
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          WK_KEY_ID: ${{ secrets.WEATHERKIT_KEY_ID }}
          WK_TEAM_ID: ${{ secrets.WEATHERKIT_TEAM_ID }}
          WK_PRIVATE_KEY: ${{ secrets.WEATHERKIT_PRIVATE_KEY }}
        run: |
          printf 'MAPBOX_ACCESS_TOKEN = %s\nWEATHERKIT_KEY_ID = %s\nWEATHERKIT_TEAM_ID = %s\nWEATHERKIT_PRIVATE_KEY = %s\n' \
            "$MAPBOX_TOKEN" "$WK_KEY_ID" "$WK_TEAM_ID" "$WK_PRIVATE_KEY" > Secrets.xcconfig

      - name: Setup Mapbox netrc
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_SECRET_TOKEN }}
        run: |
          echo "machine api.mapbox.com" >> ~/.netrc
          echo "login mapbox" >> ~/.netrc
          echo "password $MAPBOX_TOKEN" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Setup API Key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$API_KEY_BASE64" | base64 -d > ~/.private_keys/AuthKey_"$APP_STORE_API_KEY".p8

      - name: Install Distribution Certificate
        env:
          CERT_BASE64: ${{ secrets.DISTRIBUTION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$CERT_BASE64" | base64 -d > "$CERT_PATH"
          security create-keychain -p "ci" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "ci" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install Provisioning Profiles
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          WIDGET_PROFILE_BASE64: ${{ secrets.WIDGET_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/pilgrim.mobileprovision
          echo "$WIDGET_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/pilgrim-widget.mobileprovision

      - name: Bump
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            scripts/release.sh bump --version "$INPUT_VERSION"
          else
            scripts/release.sh bump
          fi

      - name: Commit Version Bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Pilgrim.xcodeproj/project.pbxproj
          git commit -m "release: bump build [skip ci]"
          git push

      - name: Snapshot Development Certs
        run: |
          KEY_PATH="$HOME/.private_keys/AuthKey_${APP_STORE_API_KEY}.p8"
          if [ ! -f "$KEY_PATH" ]; then touch "$RUNNER_TEMP/pre_build_certs.txt"; exit 0; fi
          TOKEN=$(python3 -c "
          import jwt, time
          key = open('$KEY_PATH').read()
          payload = {'iss': '$APP_STORE_API_ISSUER', 'iat': int(time.time()), 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'}
          print(jwt.encode(payload, key, algorithm='ES256', headers={'kid': '$APP_STORE_API_KEY'}))
          " 2>/dev/null || exit 0)
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=DEVELOPMENT" \
            | python3 -c "import sys,json; [print(c['id']) for c in json.load(sys.stdin).get('data',[])]" \
            > "$RUNNER_TEMP/pre_build_certs.txt" 2>/dev/null || touch "$RUNNER_TEMP/pre_build_certs.txt"

      - name: Archive
        run: scripts/release.sh archive

      - name: Export
        run: scripts/release.sh export

      - name: Upload to App Store Connect
        run: scripts/release.sh upload

      - name: Generate Changelog
        run: scripts/release.sh changelog

      - name: Revoke Auto-Created Development Certs
        if: always()
        run: |
          KEY_PATH="$HOME/.private_keys/AuthKey_${APP_STORE_API_KEY}.p8"
          if [ ! -f "$KEY_PATH" ] || [ ! -f "$RUNNER_TEMP/pre_build_certs.txt" ]; then exit 0; fi
          TOKEN=$(python3 -c "
          import jwt, time
          key = open('$KEY_PATH').read()
          payload = {'iss': '$APP_STORE_API_ISSUER', 'iat': int(time.time()), 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'}
          print(jwt.encode(payload, key, algorithm='ES256', headers={'kid': '$APP_STORE_API_KEY'}))
          " 2>/dev/null || exit 0)
          NEW_CERTS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=DEVELOPMENT" \
            | python3 -c "import sys,json; [print(c['id']) for c in json.load(sys.stdin).get('data',[])]" 2>/dev/null || true)
          PRE_CERTS=$(cat "$RUNNER_TEMP/pre_build_certs.txt")
          for CERT_ID in $NEW_CERTS; do
            if ! echo "$PRE_CERTS" | grep -q "$CERT_ID"; then
              curl -s -X DELETE -H "Authorization: Bearer $TOKEN" \
                "https://api.appstoreconnect.apple.com/v1/certificates/$CERT_ID" || true
              echo "Revoked new development cert: $CERT_ID"
            fi
          done

      - name: Cleanup
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
