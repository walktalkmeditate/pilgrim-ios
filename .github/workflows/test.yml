name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        id: pods-cache
        with:
          path: Pods
          key: pods-${{ hashFiles('Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        if: steps.pods-cache.outputs.cache-hit != 'true'
        run: pod install

      - uses: actions/cache@v4
        with:
          path: DerivedData
          key: deriveddata-${{ hashFiles('Pilgrim.xcworkspace/contents.xcworkspacedata', 'Podfile.lock') }}-${{ github.sha }}
          restore-keys: |
            deriveddata-${{ hashFiles('Pilgrim.xcworkspace/contents.xcworkspacedata', 'Podfile.lock') }}-
            deriveddata-

      - name: Run tests
        run: |
          xcodebuild test \
            -workspace Pilgrim.xcworkspace \
            -scheme Pilgrim \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
